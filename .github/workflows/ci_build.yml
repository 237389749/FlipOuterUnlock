name: CI Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ v* ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Run lint
        continue-on-error: true
        run: ./gradlew :app:lintDebug --continue

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check signing key availability
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.ALIAS }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore signing key
        if: steps.signing.outputs.available == 'true'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > key.jks
          echo "androidStoreFile=key.jks" >> gradle.properties
          echo "androidStorePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "androidKeyAlias=${{ secrets.ALIAS }}" >> gradle.properties
          echo "androidKeyPassword=${{ secrets.KEY_PASSWORD }}" >> gradle.properties

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Build (Release)
        if: steps.signing.outputs.available == 'true'
        run: |
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8' >> ~/.gradle/gradle.properties
          ./gradlew :app:assembleRelease
          echo "APK_GLOB=app/build/outputs/apk/release/*.apk" >> $GITHUB_ENV

      - name: Build (Debug)
        if: steps.signing.outputs.available == 'false'
        run: |
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8' >> ~/.gradle/gradle.properties
          ./gradlew :app:assembleDebug
          echo "APK_GLOB=app/build/outputs/apk/debug/*.apk" >> $GITHUB_ENV

      - name: Set artifact name
        id: artifact_name
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "suffix=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "suffix=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          path: ${{ env.APK_GLOB }}
          name: FlipOuterUnlock_${{ steps.artifact_name.outputs.suffix }}
